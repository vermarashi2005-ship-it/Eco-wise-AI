<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoWise AI</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<header>

<h1>🌿 EcoWise AI</h1>

<p>Your Sustainable Shopping Assistant</p>

</header>

<div class="chat-box" id="chatBox">

<div class="bot">

👋 Welcome to EcoWise AI!

<br><br>

Search products like:

<ul>

<li>Organic Shampoo under ₹500</li>

<li>Biodegradable Garbage Bags</li>

<li>Vegan Body Lotion</li>

<li>Bamboo Toothbrush</li>

</ul>

</div>

</div>

<div class="input-area">

<input
id="userInput"
type="text"
placeholder="Search eco-friendly products..."
>

<button onclick="sendMessage()">

Search

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
